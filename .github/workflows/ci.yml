name: GoCart CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gocart_test
          POSTGRES_USER: gocart
          POSTGRES_PASSWORD: gocart
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
      
          - name: Lint
          working-directory: backend
          run: |
            flake8 apps config --max-line-length=120 --exclude=migrations --ignore=F401,F811,E231,E271,E302,W292,W293
            black --check apps config

      - name: Run migrations
        working-directory: backend
        env:
          SECRET_KEY: test-secret
          DB_NAME: gocart_test
          DB_USER: gocart
          DB_PASSWORD: gocart
          DB_HOST: localhost
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: test-secret
          DB_NAME: gocart_test
          DB_USER: gocart
          DB_PASSWORD: gocart
          DB_HOST: localhost
          REDIS_URL: redis://localhost:6379/0
        run: pytest

  frontend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & test
        working-directory: frontend
        run: |
          npm install
          npm run lint
          npm run test -- --passWithNoTests

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t gocart-backend ./backend

      - name: Build frontend image
        run: docker build -t gocart-frontend ./frontend
